<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>PokerExcel - Strategy Viewer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        
        <div id="gto-action-tree" class="gto-nav-bar"></div>
        
        <div id="poker-matrix" class="matrix"></div>

        <div class="legend">
            <span class="legend-item"><div class="box raise"></div> Raise</span>
            <span class="legend-item"><div class="box call"></div> Call</span>
            <span class="legend-item"><div class="box fold"></div> Fold</span>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
